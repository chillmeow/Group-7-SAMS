<div class="wrapper">
  <div class="outer-container">
    <div class="main-panel">
      <!-- SIDEBAR -->
      <div class="sidebar">
        <div class="menu-card">
          <!-- Logo Area INSIDE gray card -->
          <div class="logo-area">
            <div class="yellow-bars">
              <span class="bar-top"></span>
              <span class="bar-middle"></span>
              <span class="bar-bottom"></span>
            </div>

            <div class="sams-wrapper">
              <h1 class="sams-text">SAMS</h1>
            </div>
          </div>

          <div class="sams-divider"></div>

          <ul class="menu">
            <li><i class="fa fa-home"></i> Dashboard</li>
            <li><i class="fa fa-book"></i> My Subjects</li>
            <li><i class="fa fa-calendar-check"></i> Attendance Management</li>
            <li><i class="fa fa-bell"></i> Notification</li>
            <li><i class="fa fa-envelope"></i> Messages</li>
            <li><i class="fa fa-user"></i> My Profile</li>
            <li><i class="fa fa-cog"></i> Account Settings</li>
            <li><i class="fa fa-question-circle"></i> Help</li>

            <li class="logout" (click)="logout()">
              <i class="fa fa-sign-out-alt"></i>
              Logout
            </li>
          </ul>

          <div class="ustp-logo">
            <img src="assets/images/USTP_logo.png" alt="USTP Logo" />
          </div>
        </div>
      </div>

      <!-- MAIN CONTENT -->
      <div class="content">
        <div class="welcome-bar">Welcome!</div>

        <div class="line-divider"></div>

        <div class="cards">
          <div class="card">
            <i class="fa fa-book-open icon"></i>
            <div>
              <p><b>Total Subject</b></p>
              <span><b>(3)</b></span>
            </div>
          </div>

          <div class="card">
            <i class="fa fa-chalkboard icon"></i>
            <div>
              <p><b>Total Sections</b></p>
              <span><b>(3)</b></span>
            </div>
          </div>

          <div class="card">
            <i class="fa fa-users icon"></i>
            <div>
              <p><b>Total No. Students</b></p>
              <span><b>(105)</b></span>
            </div>
          </div>

          <div class="card">
            <i class="fa fa-user-friends icon"></i>
            <div>
              <p><b>Classes Today</b></p>
              <span><b>(1)</b></span>
            </div>
          </div>

          <div class="card center-card">
            <i class="fa fa-clipboard-list icon"></i>
            <div>
              <p><b>Pending Attendance</b></p>
              <span><b>(0)</b></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="stat-card" [attr.data-variant]="variant">
  <div class="stat-top">
    <div class="text-group">
      <p class="label">{{ label }}</p>
      <h3 class="value">{{ value }}</h3>
    </div>

    <div class="icon-shell">
      <i [class]="icon" aria-hidden="true"></i>
    </div>
  </div>

  <p class="subtitle" *ngIf="subtitle">{{ subtitle }}</p>

  <div class="trend" *ngIf="trend" [attr.data-direction]="trendDirection">
    <i
      class="pi"
      [class.pi-arrow-up-right]="trendDirection === 'up'"
      [class.pi-arrow-down-right]="trendDirection === 'down'"
      [class.pi-minus]="trendDirection === 'neutral'"
      aria-hidden="true"
    ></i>
    <span>{{ trend }}</span>
  </div>
</div>

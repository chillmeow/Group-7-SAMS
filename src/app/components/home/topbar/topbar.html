<header class="topbar">
  <div class="left-top">
    <button
      *ngIf="isMobile"
      type="button"
      class="menu-toggle"
      (click)="onMenuToggle()"
      [attr.aria-label]="getMenuButtonLabel()"
      [attr.aria-expanded]="isMobileSidebarOpen"
      aria-controls="app-sidebar"
    >
      <i class="pi" [ngClass]="getMenuIconClass()"></i>
    </button>

    <h2>{{ pageTitle }}</h2>
  </div>

  <div class="top-icons">
    <div class="search-shell" #searchRef [class.active]="isSearchOpen">
      <div class="search-box" *ngIf="isSearchOpen">
        <i class="pi pi-search search-leading-icon" aria-hidden="true"></i>

        <input
          #searchInput
          type="text"
          [(ngModel)]="searchQuery"
          placeholder="Search modules, records, users..."
          class="search-input"
          (keydown.escape)="toggleSearch()"
        />

        <button
          *ngIf="searchQuery"
          type="button"
          class="search-clear"
          (click)="clearSearch($event)"
          aria-label="Clear search"
        >
          <i class="pi pi-times"></i>
        </button>

        <button
          type="button"
          class="search-submit"
          (click)="toggleSearch()"
          aria-label="Close search"
        >
          <i class="pi pi-check"></i>
        </button>
      </div>

      <button
        type="button"
        class="icon-btn"
        *ngIf="!isSearchOpen"
        (click)="toggleSearch()"
        aria-label="Open search"
      >
        <i class="pi pi-search"></i>
      </button>
    </div>

    <button
      type="button"
      class="icon-btn theme-btn"
      (click)="toggleTheme()"
      [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'"
    >
      <i [class]="isDarkMode ? 'pi pi-sun' : 'pi pi-moon'"></i>
    </button>

    <div class="notification-wrap" #notifRef>
      <button
        type="button"
        class="icon-btn notification-btn"
        (click)="toggleNotif($event)"
        [attr.aria-label]="isNotifOpen ? 'Close notifications' : 'Open notifications'"
        [attr.aria-expanded]="isNotifOpen"
      >
        <i class="pi pi-bell"></i>
        <span class="badge" *ngIf="unreadCount > 0">
          {{ unreadCount > 99 ? '99+' : unreadCount }}
        </span>
      </button>

      <div class="notif-dropdown" *ngIf="isNotifOpen">
        <div class="notif-header">
          <div>
            <h3>Notifications</h3>
            <p>
              <ng-container *ngIf="unreadCount > 0; else noUnreadTopbar">
                {{ unreadCount }} unread update{{ unreadCount > 1 ? 's' : '' }}
              </ng-container>

              <ng-template #noUnreadTopbar> You are all caught up </ng-template>
            </p>
          </div>

          <button
            type="button"
            class="notif-action"
            (click)="markAllAsRead($event)"
            [disabled]="unreadCount === 0"
          >
            Mark all read
          </button>
        </div>

        <div class="notif-body" *ngIf="!isLoadingNotifications; else notifLoading">
          <div class="notif-list" *ngIf="notifications.length > 0; else emptyNotif">
            <div
              class="notif-item"
              *ngFor="let item of notifications; trackBy: trackByNotification"
              [class.unread]="!item.read"
              (click)="openNotification(item, $event)"
              tabindex="0"
              role="button"
              [attr.aria-label]="item.title"
            >
              <div class="notif-icon" [ngClass]="getNotificationToneClass(item.type)">
                <i [class]="getNotificationIcon(item.type)" aria-hidden="true"></i>
              </div>

              <div class="notif-content">
                <div class="notif-row">
                  <div class="notif-title-group">
                    <h4>{{ item.title }}</h4>

                    <span class="notif-type-pill" [ngClass]="getNotificationToneClass(item.type)">
                      {{ getNotificationTypeLabel(item.type) }}
                    </span>
                  </div>

                  <span class="notif-time">{{ item.createdAt | date: 'short' }}</span>
                </div>

                <p>{{ item.message }}</p>

                <div class="notif-footer" *ngIf="item.link || !item.read">
                  <span *ngIf="!item.read" class="notif-status">
                    <i class="pi pi-circle-fill"></i>
                    New
                  </span>

                  <span *ngIf="item.link" class="notif-link-hint">
                    <i class="pi pi-external-link"></i>
                    Open
                  </span>
                </div>
              </div>

              <button
                type="button"
                class="notif-remove"
                (click)="removeNotification(item.id, $event)"
                aria-label="Remove notification"
              >
                <i class="pi pi-times"></i>
              </button>
            </div>
          </div>
        </div>

        <ng-template #notifLoading>
          <div class="notif-empty">
            <i class="pi pi-spin pi-spinner"></i>
            <p>Loading notifications...</p>
          </div>
        </ng-template>

        <ng-template #emptyNotif>
          <div class="notif-empty">
            <i class="pi pi-bell-slash"></i>
            <p>No notifications yet.</p>
          </div>
        </ng-template>

        <div class="notif-dropdown-footer">
          <button type="button" (click)="viewAllNotifications($event)">
            <i class="pi pi-inbox"></i>
            View all notifications
          </button>
        </div>
      </div>
    </div>

    <div class="profile" #profileRef>
      <button
        type="button"
        class="profile-trigger"
        (click)="toggleProfile($event)"
        [attr.aria-label]="isProfileOpen ? 'Close profile menu' : 'Open profile menu'"
        [attr.aria-expanded]="isProfileOpen"
      >
        <div class="avatar">{{ getUserInitial() }}</div>

        <div class="profile-info">
          <h3>{{ getUserFullName() }}</h3>
          <p>{{ getUserRoleLabel() }}</p>
        </div>

        <i class="pi pi-chevron-down arrow" [class.rotate]="isProfileOpen"></i>
      </button>

      <div class="profile-dropdown" *ngIf="isProfileOpen" role="menu">
        <button type="button" role="menuitem" (click)="goToProfile($event)">
          <i class="pi pi-user" aria-hidden="true"></i>
          <span>Profile</span>
        </button>

        <button type="button" role="menuitem" (click)="openSettings($event)">
          <i class="pi pi-cog" aria-hidden="true"></i>
          <span>Settings</span>
        </button>

        <button type="button" role="menuitem" (click)="openFaqs($event)">
          <i class="pi pi-question-circle" aria-hidden="true"></i>
          <span>FAQs</span>
        </button>

        <hr />

        <button type="button" role="menuitem" class="logout" (click)="logout($event)">
          <i class="pi pi-sign-out" aria-hidden="true"></i>
          <span>Logout</span>
        </button>
      </div>
    </div>
  </div>
</header>

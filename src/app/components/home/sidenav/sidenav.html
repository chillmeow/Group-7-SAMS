<aside
  id="app-sidebar"
  class="sidebar"
  [class.collapsed]="collapsed && !isMobile"
  [class.mobile-open]="isMobile && mobileOpen"
  [class.mobile-mode]="isMobile"
  [attr.aria-hidden]="isMobile && !mobileOpen ? 'true' : 'false'"
  aria-label="Primary navigation"
>
  <button
    *ngIf="!isMobile"
    type="button"
    class="sidebar-toggle"
    (click)="onToggleCollapse()"
    [attr.aria-label]="collapsed ? 'Expand sidebar' : 'Collapse sidebar'"
    [attr.aria-expanded]="!collapsed"
    aria-controls="app-sidebar"
  >
    <i
      class="pi"
      [class.pi-angle-right]="collapsed"
      [class.pi-angle-left]="!collapsed"
      aria-hidden="true"
    ></i>
  </button>

  <div class="logo" [class.logo-collapsed]="collapsed && !isMobile">
    <img src="/assets/images/SAMS_logo2.png" alt="SAMS Logo" />

    <div class="text" *ngIf="!collapsed || isMobile">
      <h1 class="title">SAMS</h1>
      <p class="sub-title">Student Attendance Monitoring System</p>
    </div>
  </div>

  <hr class="line" aria-hidden="true" />

  <div class="sidebar-scroll-area">
    <p class="portal-label" *ngIf="!collapsed || isMobile">MAIN MENU</p>

    <nav class="nav-list" aria-label="Main menu" (keydown)="onNavKeydown($event)">
      <a
        #navLink
        *ngFor="let item of menuItems; let i = index"
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link"
        [class.has-message-badge]="isMessagesItem(item) && unreadMessageCount > 0"
        [attr.aria-label]="
          isMessagesItem(item) && unreadMessageCount > 0
            ? item.label + ', ' + getUnreadMessageLabel() + ' unread'
            : item.label
        "
        [attr.title]="collapsed && !isMobile ? item.label : null"
        (click)="handleItemClick()"
        (focus)="focusedIndex = i"
        (keydown)="onItemKeydown($event, i)"
      >
        <span class="nav-icon-wrap">
          <i [class]="item.icon" aria-hidden="true"></i>

          <span
            class="nav-message-dot"
            *ngIf="isMessagesItem(item) && unreadMessageCount > 0"
            aria-hidden="true"
          ></span>
        </span>

        <span class="nav-label" *ngIf="!collapsed || isMobile">{{ item.label }}</span>

        <span
          class="nav-message-badge"
          *ngIf="isMessagesItem(item) && unreadMessageCount > 0 && (!collapsed || isMobile)"
          aria-hidden="true"
        >
          {{ getUnreadMessageLabel() }}
        </span>
      </a>
    </nav>

    <section
      class="admin-management-section"
      *ngIf="currentRole === 'admin'"
      aria-labelledby="admin-management-label"
    >
      <hr class="admin-section-line" aria-hidden="true" />

      <p id="admin-management-label" class="admin-section-label" *ngIf="!collapsed || isMobile">
        ADMIN MANAGEMENT
      </p>

      <nav class="admin-visual-list" aria-label="Admin management menu">
        <ng-container *ngFor="let adminItem of adminManagementItems">
          <a
            *ngIf="adminItem.route; else disabledAdminManagementItem"
            class="admin-visual-link"
            [routerLink]="adminItem.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            [attr.aria-label]="adminItem.label"
            [attr.title]="collapsed && !isMobile ? adminItem.label : null"
            (click)="handleItemClick()"
          >
            <i [class]="adminItem.icon" aria-hidden="true"></i>
            <span *ngIf="!collapsed || isMobile">{{ adminItem.label }}</span>
          </a>

          <ng-template #disabledAdminManagementItem>
            <div
              class="admin-visual-link disabled"
              aria-disabled="true"
              [attr.aria-label]="adminItem.label"
              [attr.title]="collapsed && !isMobile ? adminItem.label : null"
            >
              <i [class]="adminItem.icon" aria-hidden="true"></i>
              <span *ngIf="!collapsed || isMobile">{{ adminItem.label }}</span>
            </div>
          </ng-template>
        </ng-container>
      </nav>
    </section>
  </div>
</aside>

<section class="dashboard-page">
  <div class="dashboard-header">
    <div>
      <h1>Welcome, {{ displayName }}</h1>
      <p>{{ roleLabel }} Portal</p>
    </div>

    <button type="button" class="refresh-btn" (click)="loadDashboard()" [disabled]="isLoading">
      <i class="pi pi-refresh"></i>
      {{ isLoading ? 'Loading...' : 'Refresh' }}
    </button>
  </div>

  <div class="alert error" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <div class="loading-card" *ngIf="isLoading">
    <i class="pi pi-spin pi-spinner"></i>
    Loading dashboard data...
  </div>

  <ng-container *ngIf="!isLoading">
    <section class="stats-grid">
      <article
        class="stat-card"
        *ngFor="let stat of stats; trackBy: trackByStat"
        [ngClass]="stat.tone"
      >
        <div class="stat-icon">
          <i [class]="stat.icon"></i>
        </div>

        <div class="stat-copy">
          <span>{{ stat.label }}</span>
          <strong>{{ stat.value }}</strong>
          <small>{{ stat.subtitle }}</small>
        </div>
      </article>
    </section>

    <section class="dashboard-board">
      <div class="board-header">
        <h2>Dashboard</h2>

        <a routerLink="/reports" class="view-btn" *ngIf="currentRole === 'admin'"> View Reports </a>
      </div>

      <div class="card-grid" *ngIf="cards.length > 0; else emptyDashboard">
        <article
          class="dashboard-card"
          *ngFor="let card of cards; trackBy: trackByCard"
          [ngClass]="card.tone"
          [routerLink]="card.route"
        >
          <div class="card-top">
            <h3>{{ card.title }}</h3>
            <span>{{ card.status }}</span>
          </div>

          <p><strong>Purpose:</strong> {{ card.purpose }}</p>
          <p><strong>Date:</strong> {{ card.date }}</p>

          <button type="button" class="details-btn">View Details</button>
        </article>
      </div>

      <ng-template #emptyDashboard>
        <div class="empty-state">No dashboard records available.</div>
      </ng-template>
    </section>
  </ng-container>
</section>

<div class="page">
  <div class="left-panel">
    <div class="overlay">
      <div class="logo-glass">
        <img src="/assets/images/USTP_logo.png" class="logo" />
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="decor-bars">
      <span class="bar bar1"></span>
      <span class="bar bar2"></span>
      <span class="bar bar3"></span>
    </div>

    <div class="login-card">
      <h1>SAMS</h1>
      <p>Student Attendance Monitoring System</p>

      <div class="input-group">
        <i class="pi pi-envelope left-icon"></i>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          autocomplete="email"
        />
        <label for="email">Email</label>
      </div>

      <div class="input-group">
        <i class="pi pi-lock left-icon"></i>

        <input
          [type]="showPassword ? 'text' : 'password'"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          autocomplete="current-password"
        />
        <label for="password">Password</label>

        <button
          type="button"
          class="toggle-password"
          (click)="togglePassword()"
          [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
        >
          <i class="pi" [ngClass]="showPassword ? 'pi-eye-slash' : 'pi-eye'"></i>
        </button>
      </div>

      <label class="remember">
        <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
        <span class="custom-check"></span>
        <span class="remember-text">Remember me</span>
      </label>

      <button class="login-btn" (click)="login()" [disabled]="isLoading">
        <span *ngIf="!isLoading">Login</span>
        <span *ngIf="isLoading">Logging in...</span>
      </button>
    </div>
  </div>
</div>
